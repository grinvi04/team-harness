# .github/workflows/ai-review.yml — PR AI 리뷰 (claude-code-action)
# 인증: Claude 구독(OAuth 토큰) 사용 — Anthropic API 사용량 과금 없음.
#   토큰 발급: 로컬에서 `claude setup-token` 실행 → 출력값을
#   repo Settings → Secrets → Actions 에 CLAUDE_CODE_OAUTH_TOKEN 으로 등록.
# 토큰 미설정 시: 잡은 그대로 통과(스킵) — API 키 없이도 빨간 X 없이 동작.
#   등록되면 자동으로 실제 리뷰가 활성화된다.
name: ai-review

on:
  pull_request:
    branches: [main, develop]

jobs:
  ai-review:
    # back-merge PR(hotfix/*·release/* → develop)은 main PR에서 이미 리뷰됨 — 스킵 (pr-review-gate 부록 참조)
    if: "github.base_ref != 'develop' || (!startsWith(github.head_ref, 'hotfix/') && !startsWith(github.head_ref, 'release/'))"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # 구독 토큰 유무를 확인 — 없으면 리뷰 스텝을 스킵해 잡이 통과한다(필수 체크 아님).
      - name: Check subscription token
        id: token
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -n "$CLAUDE_CODE_OAUTH_TOKEN" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::CLAUDE_CODE_OAUTH_TOKEN 미설정 — AI 리뷰 스킵(필수 아님). 'claude setup-token' 후 repo secret 등록 시 활성화."
          fi

      - uses: anthropics/claude-code-action@v1
        if: steps.token.outputs.present == 'true'
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            이 PR을 리뷰하라. 기준은 repo의 AGENTS.md와 다음 체크리스트(우선순위 순):
            1) 정확성 — 요구사항·경계값·트랜잭션 경계·에러 경로
            2) 경계 준수 — 도메인 모듈 직접 참조, 계층 역류, 크로스 스키마 조인
            3) 테스트 — 명세 검증 여부(구현 복사 금지), 실패 케이스
            4) 보안 — 입력 검증, 권한 검사 누락, 개인정보 로그 출력
            5) DB — forward-only 마이그레이션, 무중단 호환, N+1
            발견 항목은 심각도(HIGH/MEDIUM/LOW)를 붙여 해당 라인에 인라인 코멘트로 남겨라.
            모든 발견을 보고하라 — 중요도 필터링은 사람 리뷰어가 한다.
            이슈가 없으면 "AI 리뷰: 발견 사항 없음" 코멘트 하나만 남겨라.
          claude_args: "--model claude-sonnet-4-6 --max-turns 15"
