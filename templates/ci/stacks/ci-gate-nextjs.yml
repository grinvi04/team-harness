# ci-gate — Next.js 단독 (App Router 풀스택)
# CUSTOMIZE: node-version, 필요한 env 변수 추가
name: ci-gate

on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22  # CUSTOMIZE: .nvmrc 있으면 node-version-file: .nvmrc 로 교체
          cache: npm

      - run: npm ci
      - run: npm run lint                      # next lint (eslint-config-next 포함) 또는 eslint
      - run: npm run type-check --if-present    # tsc --noEmit (Next.js 빌드는 타입오류를 무시 설정일 수 있어 별도 강제)
      - run: npm run lint:design --if-present   # 디자인 토큰 게이트
      - run: npm run test --if-present          # vitest/jest (있으면)
      - run: npm run build                      # next build — NEXT_PUBLIC_ 노출·RSC 경계 오류를 빌드가 잡음

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Organization repo는 GITLEAKS_LICENSE secret 필요 (개인 repo는 불필요)
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
