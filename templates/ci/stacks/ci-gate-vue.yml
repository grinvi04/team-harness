# ci-gate — Vue 3 (Vite SPA)
# CUSTOMIZE: node-version, 필요한 env 변수 추가
name: ci-gate

on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22  # CUSTOMIZE: .nvmrc 있으면 node-version-file: .nvmrc 로 교체
          cache: npm

      - run: npm ci
      - run: npm run lint                       # eslint-plugin-vue (eslint-config-next 아님)
      - run: npm run type-check --if-present     # vue-tsc --noEmit (.vue SFC 타입체크 — tsc만으론 부족)
      - run: npm run lint:design --if-present    # 디자인 토큰 게이트
      - run: npm run test:unit --if-present       # vitest + @vue/test-utils
      - run: npm run build                       # vite build

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Organization repo는 GITLEAKS_LICENSE secret 필요 (개인 repo는 불필요)
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
