# ci-gate — Spring Boot 백엔드 + Node.js 프론트엔드 (풀스택)
# CUSTOMIZE: java-version, postgres 자격증명, frontend 디렉터리, env 변수
name: ci-gate

on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci_user        # CUSTOMIZE
          POSTGRES_PASSWORD: ci_password # CUSTOMIZE
          POSTGRES_DB: ci_db            # CUSTOMIZE
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci_user -d ci_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DB_URL: jdbc:postgresql://localhost:5432/ci_db  # CUSTOMIZE
      DB_USERNAME: ci_user      # CUSTOMIZE
      DB_PASSWORD: ci_password  # CUSTOMIZE
      # CUSTOMIZE: JWT_SECRET 등 필요한 env 추가

    defaults:
      run:
        working-directory: backend  # CUSTOMIZE

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v4
        with:
          java-version: '21'        # CUSTOMIZE: 17이면 '17'
          distribution: corretto
          cache: gradle

      - run: ./gradlew check

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend  # CUSTOMIZE

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'  # CUSTOMIZE: .nvmrc 있으면 node-version-file: frontend/.nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run type-check --if-present
      - run: npm run lint
      - run: npm run test:unit --if-present
      - run: npm run build

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Organization repo는 GITLEAKS_LICENSE secret 필요 (개인 repo는 불필요)
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
