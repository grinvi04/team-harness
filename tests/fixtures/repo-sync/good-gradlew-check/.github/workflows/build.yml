name: build
on: [push]
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - run: ./gradlew check
  test-guard:
    runs-on: ubuntu-latest
    steps:
      - run: echo allow-test-removal label check
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - uses: wagoid/commitlint-github-action@v6
        with:
          configFile: ./commitlint.config.cjs
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: gitleaks/gitleaks-action@v2
