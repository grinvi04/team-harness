# .github/workflows/ci-gate.yml — PR 품질 게이트 템플릿
# 계층 0 강제 장치: 어떤 AI 도구·사람이 작업해도 이 게이트는 통과해야 머지 가능.
# branch protection에서 이 워크플로우를 required check로 지정한다 (docs/onboarding.md 참조).
name: ci-gate

on:
  pull_request:
    branches: [main, develop]

# gitleaks-action이 PR 커밋 목록 조회에 pull-requests: read 필요 — 없으면 403 (siku 실측)
permissions:
  contents: read
  pull-requests: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── 프로젝트 스택에 맞게 교체 ──
      # - uses: actions/setup-node@v4
      #   with: { node-version: 22 }
      # - run: npm ci
      # - run: npm run lint && npm test && npm run build

      # ── E2E까지 게이트에 포함 권장 — release 브랜치 추가 커밋(리뷰 반영)도 e2e가 강제되도록.
      #    외부 백엔드(Supabase 등)는 운영 키 대신 CI 내 로컬 스택 사용 (siku ci-gate.yml 참조):
      # - uses: supabase/setup-cli@v1
      # - run: supabase start && <로컬 키로 .env 생성>
      # - run: npx playwright install --with-deps chromium && npm run test:e2e

      - name: placeholder
        run: echo "프로젝트 스택에 맞는 lint/test/build 단계로 교체하세요" && exit 1

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
