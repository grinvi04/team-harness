# team-harness 자체 PR 품질 게이트 — 가드·템플릿은 전 프로젝트가 의존하는 인프라이므로
# 구문 오류·시나리오 회귀가 머지되지 않도록 막는다.
name: ci-gate

on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: 쉘 구문 검사
        run: |
          bash -n plugins/harness-guard/scripts/guard.sh
          bash -n plugins/harness-guard/scripts/pr-create.sh
          bash -n plugins/harness-guard/scripts/pr-merge.sh
          bash -n plugins/harness-guard/scripts/set-branch-protection.sh
          bash -n plugins/harness-guard/scripts/solo-merge.sh
          bash -n templates/githooks/pre-commit
          bash -n .githooks/pre-commit
          bash -n tests/guard-test.sh
          bash -n tests/guard-matrix-test.sh
          bash -n tests/route-intent-test.sh
          bash -n tests/merge-permissions-test.sh
          bash -n tests/pr-merge-auto-test.sh
          bash -n tests/pr-create-test.sh
          bash -n tests/set-branch-protection-test.sh
          bash -n tests/solo-merge-test.sh
          bash -n tests/new-repo-test.sh
          bash -n tests/alembic-heads-test.sh
          bash -n tests/alembic-destructive-ddl-test.sh
          bash -n tests/activerecord-destructive-ddl-test.sh
          bash -n tests/skill-discovery-test.sh
          bash -n tests/enforce-subagent-model-test.sh
          bash -n tests/plugin-wiring-test.sh
          bash -n tests/settings-deny-test.sh
          bash -n tests/codex-security-guidance-adapter-test.sh
          bash -n tests/patch-codex-security-guidance-test.sh
          bash -n tests/codex-harness-guard-patch-test.sh
          bash -n tests/codex-secret-egress-guard-test.sh
          bash -n tests/codex-pretool-guard-test.sh
          bash -n tests/codex-semantic-parity-test.sh
          bash -n tests/codex-skill-mapping-test.sh
          bash -n tests/claude-surface-isolation-test.sh
          bash -n tests/codex-plugin-cache-sync-test.sh
          bash -n scripts/new-repo.sh
          bash -n scripts/codex-hardened.sh
          node --check plugins/harness-guard/scripts/codex-security-guidance-adapter.mjs
          node --check plugins/harness-guard/scripts/patch-codex-security-guidance.mjs
          node --check plugins/harness-guard/scripts/patch-codex-harness-guard.mjs
          node --check plugins/harness-guard/scripts/codex-secret-egress-guard.mjs
          node --check plugins/harness-guard/scripts/codex-pretool-guard.mjs
          node --check plugins/harness-guard/scripts/route-intent.mjs
          node --check scripts/sync-codex-plugin-cache.mjs
          node --check scripts/merge-permissions.mjs
          node --check scripts/check-destructive-ddl.mjs
          node --check scripts/check-alembic-destructive-ddl.mjs
          node --check scripts/check-activerecord-destructive-ddl.mjs
          node --check templates/frontend/check-design-tokens.mjs

      - name: JSON 유효성 검사
        run: |
          python3 - <<'EOF'
          import json, glob
          paths = [
              "plugins/harness-guard/.claude-plugin/plugin.json",
              "plugins/harness-guard/hooks/hooks.json",
              ".claude-plugin/marketplace.json",
              "templates/settings.json",
          ] + sorted(glob.glob("templates/permissions/*.json"))
          for p in paths:
              json.load(open(p))
              print("OK", p)
          EOF

      - name: 파이썬 구문 검사 (등록된 훅 — enforce-subagent-model.py)
        run: python3 -m py_compile plugins/harness-guard/scripts/enforce-subagent-model.py

      - name: 템플릿 생성기 ruff 검사 (python repo가 복사 시 CI 통과 보장 — v0.24.1)
        run: |
          pipx install ruff==0.15.15
          ruff check --line-length 100 --select E,F,W templates/gen_arch_svg.py
          ruff format --line-length 100 --check templates/gen_arch_svg.py

      - name: 가드 시나리오 테스트
        run: bash tests/guard-test.sh

      - name: 가드 계약 전수 매트릭스
        run: bash tests/guard-matrix-test.sh

      - name: 의도 라우터 테스트
        run: bash tests/route-intent-test.sh

      - name: 권한 병합 테스트
        run: bash tests/merge-permissions-test.sh

      - name: 마이그레이션 안전성 테스트
        run: bash tests/migration-safety-test.sh

      - name: 파괴적 DDL 게이트 테스트
        run: bash tests/destructive-ddl-test.sh

      - name: Alembic 파괴 DDL 게이트 테스트
        run: bash tests/alembic-destructive-ddl-test.sh

      - name: ActiveRecord 파괴 DDL 게이트 테스트
        run: bash tests/activerecord-destructive-ddl-test.sh

      - name: 드리프트 점검 테스트
        run: bash tests/repo-sync-test.sh

      - name: pr-merge --auto·게이트 판정 테스트
        run: bash tests/pr-merge-auto-test.sh

      - name: pr-create 검증 함수 테스트
        run: bash tests/pr-create-test.sh

      - name: set-branch-protection --check 판정 테스트
        run: bash tests/set-branch-protection-test.sh

      - name: solo-merge break-glass 원자성 테스트
        run: bash tests/solo-merge-test.sh

      - name: new-repo B4 게이트 테스트
        run: bash tests/new-repo-test.sh

      - name: alembic-heads 계수 테스트
        run: bash tests/alembic-heads-test.sh

      - name: 스킬 발견성(SKILL.md) 테스트
        run: bash tests/skill-discovery-test.sh

      - name: subagent 모델 강제 훅 테스트
        run: bash tests/enforce-subagent-model-test.sh

      - name: 플러그인 배선 반증-스모크 (guard 실발동·hooksPath)
        run: bash tests/plugin-wiring-test.sh

      - name: settings.json .env-리더 deny 커버리지 (#237)
        run: bash tests/settings-deny-test.sh

      - name: Codex security-guidance adapter 테스트
        run: bash tests/codex-security-guidance-adapter-test.sh

      - name: Codex security-guidance cache refresh 패치 테스트
        run: bash tests/patch-codex-security-guidance-test.sh

      - name: Codex harness-guard hook 호환 패치 테스트
        run: bash tests/codex-harness-guard-patch-test.sh

      - name: Codex 시크릿 외부 전송 가드 테스트
        run: bash tests/codex-secret-egress-guard-test.sh

      - name: Codex PreToolUse 정규화 가드 테스트
        run: bash tests/codex-pretool-guard-test.sh

      - name: Codex semantic parity matrix 완전성
        run: bash tests/codex-semantic-parity-test.sh

      - name: Codex skill 실행 mapping
        run: bash tests/codex-skill-mapping-test.sh

      - name: Claude-facing source 격리
        run: bash tests/claude-surface-isolation-test.sh

      - name: Codex hardened launcher cache repair
        run: bash tests/codex-hardened-launcher-test.sh

      - name: Codex plugin cache 조건부 동기화
        run: bash tests/codex-plugin-cache-sync-test.sh

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
