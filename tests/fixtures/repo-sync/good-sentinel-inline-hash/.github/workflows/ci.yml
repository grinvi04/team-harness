name: ci-gate
on: [push]
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - run: npm run lint
      - run: npm test
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: gitleaks/gitleaks-action@v2
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - uses: wagoid/commitlint-github-action@v6
  test-guard:
    runs-on: ubuntu-latest
    steps:
      # #205 재현: sentinel(allow-test-removal)이 echo 문자열 안 '#12' 뒤에 있음 — 트레일링 # 오제거 시 삭제됨
      - run: echo "Removing tests? See issue #12 — requires the allow-test-removal label"
